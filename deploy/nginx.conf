# Production Nginx config for Ragulin Realty.
# Copy to /etc/nginx/sites-available/ragulin-realty, symlink into sites-enabled,
# replace YOUR_DOMAIN, then `nginx -t && systemctl reload nginx`.
# Run certbot afterwards to add SSL (it will rewrite this file to add a 443 block).

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /opt/ragulin-realty/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
